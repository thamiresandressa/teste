<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precificação Inteligente - Orde</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones simplificados (inline SVG)
        const Calculator = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <rect x="4" y="2" width="16" height="20" rx="2" strokeWidth="2"/>
                <line x1="8" y1="6" x2="16" y2="6" strokeWidth="2"/>
                <line x1="8" y1="10" x2="16" y2="10" strokeWidth="2"/>
                <line x1="8" y1="14" x2="16" y2="14" strokeWidth="2"/>
                <line x1="8" y1="18" x2="12" y2="18" strokeWidth="2"/>
            </svg>
        );

        const ArrowRight = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="5" y1="12" x2="19" y2="12" strokeWidth="2"/>
                <polyline points="12 5 19 12 12 19" strokeWidth="2"/>
            </svg>
        );

        const ArrowLeft = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12" strokeWidth="2"/>
                <polyline points="12 19 5 12 12 5" strokeWidth="2"/>
            </svg>
        );

        const DollarSign = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="12" y1="1" x2="12" y2="23" strokeWidth="2"/>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" strokeWidth="2"/>
            </svg>
        );

        const CheckCircle = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                <polyline points="9 12 11 14 15 10" strokeWidth="2"/>
            </svg>
        );

        const AlertCircle = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                <line x1="12" y1="8" x2="12" y2="12" strokeWidth="2"/>
                <line x1="12" y1="16" x2="12.01" y2="16" strokeWidth="2"/>
            </svg>
        );

        const TrendingUp = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" strokeWidth="2"/>
                <polyline points="17 6 23 6 23 12" strokeWidth="2"/>
            </svg>
        );

        const BarChart3 = () => (
            <svg className="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <line x1="12" y1="20" x2="12" y2="10" strokeWidth="2"/>
                <line x1="18" y1="20" x2="18" y2="4" strokeWidth="2"/>
                <line x1="6" y1="20" x2="6" y2="16" strokeWidth="2"/>
            </svg>
        );

        const PrecificacaoInteligente = () => {
            const [step, setStep] = useState(1);
            const [data, setData] = useState({
                tipoModelo: '',
                custosFixosMensais: '',
                faturamentoMinimo: '',
                remuneracaoPessoal: '',
                capacidadeProdutivaMensal: '',
                horasPorSemana: '',
                custosProducao: '',
                custosFerramentas: '',
                custosSuporte: '',
                custosVenda: '',
                capacidadeAlunos: '',
                precoMercado: '',
                geraAumento: '',
                impactoFinanceiro: '',
            });

            const [results, setResults] = useState({
                valorHora: 0,
                custoReal: 0,
                precoMinimo: 0,
                precoSaudavel: 0,
                precoEstrategico: 0,
                vendasNecessarias: 0,
            });

            const [diagnostico, setDiagnostico] = useState(null);

            useEffect(() => {
                calcularResultados();
            }, [data]);

            const calcularResultados = () => {
                const horasMensais = parseFloat(data.horasPorSemana) * 4 || 0;
                const faturamento = parseFloat(data.faturamentoMinimo) || 0;
                const valorHora = horasMensais > 0 ? faturamento / horasMensais : 0;

                const custosProducao = parseFloat(data.custosProducao) || 0;
                const custosFerramentas = parseFloat(data.custosFerramentas) || 0;
                const custosSuporte = parseFloat(data.custosSuporte) || 0;
                const custosVenda = parseFloat(data.custosVenda) || 0;
                
                const capacidade = parseFloat(data.capacidadeAlunos) || 1;
                const custosFixosDiluidos = custosProducao / capacidade;
                
                const custoReal = custosFixosDiluidos + custosFerramentas + custosSuporte + custosVenda;

                const precoMinimo = custoReal * 1.3;
                const precoSaudavel = custoReal * 1.6;
                const precoEstrategico = custoReal * 1.8;

                const vendasNecessarias = Math.ceil(faturamento / precoSaudavel);

                setResults({
                    valorHora: valorHora.toFixed(2),
                    custoReal: custoReal.toFixed(2),
                    precoMinimo: precoMinimo.toFixed(2),
                    precoSaudavel: precoSaudavel.toFixed(2),
                    precoEstrategico: precoEstrategico.toFixed(2),
                    vendasNecessarias,
                });
            };

            const updateData = (field, value) => {
                setData(prev => ({ ...prev, [field]: value }));
            };

            const nextStep = () => {
                if (step < 10) setStep(step + 1);
            };

            const prevStep = () => {
                if (step > 1) setStep(step - 1);
            };

            const calcularDiagnostico = () => {
                const precoAtual = parseFloat(data.precoMercado) || 0;
                const precoRecomendado = parseFloat(results.precoSaudavel) || 0;
                const impacto = parseFloat(data.impactoFinanceiro) || 0;

                let status = '';
                let cor = '';
                let recomendacao = '';

                const diferenca = ((precoAtual - precoRecomendado) / precoRecomendado) * 100;

                if (diferenca < -30) {
                    status = 'MUITO BARATO';
                    cor = 'text-red-600';
                    recomendacao = 'Seu preço está significativamente abaixo do sustentável. Você está deixando dinheiro na mesa e pode estar comprometendo a viabilidade do negócio.';
                } else if (diferenca < -10) {
                    status = 'BARATO';
                    cor = 'text-orange-600';
                    recomendacao = 'Seu preço está abaixo do ideal. Considere aumentar para melhorar sua margem e sustentabilidade.';
                } else if (diferenca <= 10) {
                    status = 'NO PONTO';
                    cor = 'text-green-600';
                    recomendacao = 'Seu preço está dentro da faixa saudável! Continue monitorando custos e valor percebido.';
                } else if (diferenca <= 30) {
                    status = 'PREMIUM';
                    cor = 'text-blue-600';
                    recomendacao = 'Seu preço está acima da média. Certifique-se de que está entregando valor percebido proporcional.';
                } else {
                    status = 'MUITO ALTO';
                    cor = 'text-purple-600';
                    recomendacao = 'Seu preço está significativamente acima do calculado. Verifique se o valor percebido e posicionamento justificam esse preço.';
                }

                const roiCliente = impacto > 0 ? (precoAtual / impacto) * 100 : 0;
                let analiseMargem = '';
                
                if (roiCliente < 5) {
                    analiseMargem = 'Excelente! Seu cliente tem um ROI de ' + (100/roiCliente).toFixed(1) + 'x. Você poderia cobrar mais.';
                } else if (roiCliente < 20) {
                    analiseMargem = 'Bom equilíbrio entre preço e valor entregue ao cliente.';
                } else {
                    analiseMargem = 'Atenção: o preço pode estar alto em relação ao valor percebido.';
                }

                setDiagnostico({
                    status,
                    cor,
                    recomendacao,
                    diferenca: diferenca.toFixed(1),
                    analiseMargem,
                    roiCliente: roiCliente.toFixed(1),
                });
            };

            const renderStep = () => {
                switch(step) {
                    case 1:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Qual tipo de produto você deseja precificar?</h2>
                                    <p className="text-gray-600 mb-6">Escolha a categoria que melhor se encaixa no seu negócio</p>
                                </div>
                                <div className="grid gap-4">
                                    {[
                                        { value: 'servico', label: 'Serviço ou projeto pontual', desc: 'Ex: desenvolvimento, design, consultoria pontual' },
                                        { value: 'infoproduto', label: 'Infoproduto', desc: 'Ex: curso gravado, workshop, programa online' },
                                        { value: 'mentoria', label: 'Mentoria ou consultoria com acompanhamento', desc: 'Ex: mentoria mensal, assessoria contínua' }
                                    ].map(option => (
                                        <button
                                            key={option.value}
                                            onClick={() => updateData('tipoModelo', option.value)}
                                            className={`p-6 border-2 rounded-lg text-left transition-all ${
                                                data.tipoModelo === option.value 
                                                    ? 'border-blue-500 bg-blue-50' 
                                                    : 'border-gray-200 hover:border-gray-300'
                                            }`}
                                        >
                                            <div className="font-semibold text-lg text-gray-800">{option.label}</div>
                                            <div className="text-sm text-gray-600 mt-1">{option.desc}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );

                    case 2:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Estrutura financeira do negócio</h2>
                                    <p className="text-gray-600 mb-6">Vamos entender os números do seu negócio</p>
                                </div>
                                <div className="grid gap-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Custos fixos mensais do negócio (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.custosFixosMensais}
                                            onChange={(e) => updateData('custosFixosMensais', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 5000"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Softwares, equipe, marketing, contabilidade, ferramentas, etc</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Faturamento mínimo mensal necessário (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.faturamentoMinimo}
                                            onChange={(e) => updateData('faturamentoMinimo', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 15000"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Valor que o negócio precisa gerar para se sustentar</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Valor desejado de remuneração pessoal (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.remuneracaoPessoal}
                                            onChange={(e) => updateData('remuneracaoPessoal', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 10000"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Capacidade produtiva mensal
                                        </label>
                                        <input
                                            type="number"
                                            value={data.capacidadeProdutivaMensal}
                                            onChange={(e) => updateData('capacidadeProdutivaMensal', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 20"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Número máximo de clientes, projetos ou vendas que consegue sustentar</p>
                                    </div>
                                </div>
                            </div>
                        );

                    case 3:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Cálculo do valor da hora estratégica</h2>
                                    <p className="text-gray-600 mb-6">Vamos descobrir quanto vale seu tempo</p>
                                </div>
                                <div className="grid gap-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Quantas horas por semana são dedicadas ao negócio?
                                        </label>
                                        <input
                                            type="number"
                                            value={data.horasPorSemana}
                                            onChange={(e) => updateData('horasPorSemana', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 40"
                                        />
                                    </div>

                                    {data.horasPorSemana && (
                                        <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-lg border border-blue-200">
                                            <div className="flex items-center gap-3 mb-3">
                                                <div className="w-6 h-6 text-blue-600"><DollarSign /></div>
                                                <h3 className="font-semibold text-gray-800">Seu tempo estratégico vale:</h3>
                                            </div>
                                            <div className="text-4xl font-bold text-blue-600">
                                                R$ {results.valorHora}
                                            </div>
                                            <div className="text-sm text-gray-600 mt-2">por hora</div>
                                            <div className="mt-4 text-sm text-gray-700">
                                                <div>• Horas disponíveis por mês: {(parseFloat(data.horasPorSemana) * 4).toFixed(0)}h</div>
                                                <div>• Base para precificação de serviços e tempo investido</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        );

                    case 4:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Custos específicos do produto</h2>
                                    <p className="text-gray-600 mb-6">Detalhe os custos envolvidos na entrega</p>
                                </div>
                                <div className="grid gap-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Custos de produção do produto (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.custosProducao}
                                            onChange={(e) => updateData('custosProducao', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 2000"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Gravação, design, edição (custo fixo)</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Custos de ferramentas por venda (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.custosFerramentas}
                                            onChange={(e) => updateData('custosFerramentas', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 50"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Zoom, plataforma, comunidade (por cliente)</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Custos de suporte por venda (R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.custosSuporte}
                                            onChange={(e) => updateData('custosSuporte', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 100"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Tempo seu ou do time dedicado a cada cliente</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Custos de venda (% ou R$)
                                        </label>
                                        <input
                                            type="number"
                                            value={data.custosVenda}
                                            onChange={(e) => updateData('custosVenda', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 150"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Tráfego, afiliados, taxas, impostos</p>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-2">
                                            Capacidade de alunos ou clientes por turma
                                        </label>
                                        <input
                                            type="number"
                                            value={data.capacidadeAlunos}
                                            onChange={(e) => updateData('capacidadeAlunos', e.target.value)}
                                            className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            placeholder="Ex: 30"
                                        />
                                        <p className="text-xs text-gray-500 mt-1">Para diluir custos fixos de produção</p>
                                    </div>
                                </div>
                            </div>
                        );

                    case 5:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Custo real de entrega</h2>
                                    <p className="text-gray-600 mb-6">Análise completa dos seus custos</p>
                                </div>
                                
                                <div className="bg-gradient-to-r from-amber-50 to-orange-50 p-6 rounded-lg border border-amber-200">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="w-6 h-6 text-amber-600"><Calculator /></div>
                                        <h3 className="font-semibold text-gray-800">Custo mínimo para entregar esse produto:</h3>
                                    </div>
                                    <div className="text-4xl font-bold text-amber-600 mb-4">
                                        R$ {results.custoReal}
                                    </div>
                                    
                                    <div className="space-y-2 text-sm text-gray-700">
                                        <div className="flex justify-between border-b border-amber-200 pb-2">
                                            <span>Custos fixos diluídos:</span>
                                            <span className="font-medium">R$ {((parseFloat(data.custosProducao) || 0) / (parseFloat(data.capacidadeAlunos) || 1)).toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-amber-200 pb-2">
                                            <span>Custos de ferramentas:</span>
                                            <span className="font-medium">R$ {parseFloat(data.custosFerramentas || 0).toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-amber-200 pb-2">
                                            <span>Custos de suporte:</span>
                                            <span className="font-medium">R$ {parseFloat(data.custosSuporte || 0).toFixed(2)}</span>
                                        </div>
                                        <div className="flex justify-between border-b border-amber-200 pb-2">
                                            <span>Custos de venda:</span>
                                            <span className="font-medium">R$ {parseFloat(data.custosVenda || 0).toFixed(2)}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-4 p-3 bg-amber-100 rounded-lg">
                                        <p className="text-xs text-amber-800">
                                            ⚠️ Este é o valor mínimo absoluto. Cobrar abaixo disso significa prejuízo.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        );

                    case 6:
                        return (
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Preço sustentável</h2>
                                    <p className="text-gray-600 mb-6">Três níveis de precificação baseados em margem</p>
                                </div>

                                <div className="grid gap-4">
                                    <div className="bg-gradient-to-r from-red-50 to-pink-50 p-6 rounded-lg border-2 border-red-200">
                                        <div className="flex items-center justify-between mb-2">
                                            <h3 className="font-semibold text-gray-800">Preço Mínimo Sustentável</h3>
                                            <span className="text-xs bg-red-100 text-red-700 px-3 py-1 rounded-full">30% margem</span>
                                        </div>
                                        <div className="text-3xl font-bold text-red-600">
                                            R$ {results.precoMinimo}
                                        </div>
                                        <p className="text-sm text-gray-600 mt-2">Cobre custos e gera pequena margem</p>
                                    </div>

                                    <div className="bg-gradient-to-r from-green-50 to-emerald-50 p-6 rounded-lg border-2 border-green-300">
                                        <div className="flex items-center justify-between mb-2">
                                            <h3 className="font-semibold text-gray-800">Preço Saudável (RECOMENDADO)</h3>
                                            <span className="text-xs bg-green-100 text-green-700 px-3 py-1 rounded-full">60% margem</span>
                                        </div>
                                        <div className="text-3xl font-bold text-green-600">
                                            R$ {results.precoSaudavel}
                                        </div>
                                        <p className="text-sm text-gray-600 mt-2">Cobre custos e gera margem confortável</p>
                                        </div>

                                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-lg border-2 border-blue-200">
                                        <div className="flex items-center justify-between mb-2">
                                            <h3 className="font-semibold text-gray-800">Preço Estratégico</h3>
                                            <span className="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full">80% margem</span>
                                        </div>
                                        <div className="text-3xl font-bold text-blue-600">
                                            R$ {results.precoEstrategico}
                                        </div>
                                        <p className="text-sm text-gray-600 mt-2">Permite crescimento acelerado do negócio</p>
                                    </div>
                                </div>

                                <div className="bg-gray-50 p-6 rounded-lg border border-gray-200 mt-6">
                                    <h4 className="font-semibold text-gray-800 mb-3">Para sustentar seu negócio:</h4>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white p-4 rounded-lg border border-gray-200 flex-1">
                                            <div className="text-sm text-gray-600">Vendas necessárias (preço saudável)</div>
                                            <div className="text-2xl font-bold text-gray-800">{results.vendasNecessarias} vendas/mês</div>
                                        </div>

                                    className="px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg font-medium hover:from-blue-700 hover:to-indigo-700 transition flex items-center gap-2"
                                >
                                    Próxima
                                    <div className="w-4 h-4"><ArrowRight /></div>
                                </button>
                            ) : (
                                <button
                                    onClick={() => setStep(1)}
                                    className="px-6 py-3 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-lg font-medium hover:from-green-700 hover:to-emerald-700 transition"
                                >
                                    Recalcular
                                </button>
                            )}
                        </div>

                        <div className="text-center mt-8 text-sm text-gray-500">
                            <p>Desenvolvido para negócios digitais • Mentorias • Consultorias • Infoprodutos</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrecificacaoInteligente />);
    </script>
</body>
</html>
